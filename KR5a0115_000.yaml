body:
  text: 綏德軍道民任照一注陰者暗也符者合也故天道顯而彰乎大理人道通乎妙而不知是以黃帝修陰符經以明天道與人道有暗合大理之妙故謂之陰符焉觀天之道執天之行盡矣天運乎上地處乎下聖人位乎天地之中而達為三才者有相通之用緣有相通之用故陰符經首言觀天之道執天之行盡矣觀則望而可見執則取而可行蓋陰符經三百餘言首尾盡明天道始終動靜之理使學者執而行之方盡進道之妙故天道不觀則不見人道不察則不知是以人道與天道同根一氣有陰符暗合修行之理要在尋文而知乎根本探微取妙搜正遣邪托日月而成功即為神人由乎通微入妙之致也微則與道為一妙則與神同體莊子云其一與天為徒其不一與人為徒即知天法與我法不異我道與天道何殊不可不察也天有五賊見之者昌五賊在心施行乎天宇宙在乎手萬化生乎身天道本無賊人之心以人心自不覺知五行有逆順相返之氣猶乎賊之盜也要在學人繫心五賊返為我用故天生天殺造化萬物莫不因五行為用也五行者是陰陽之氣散而為五星五星之氣散而為五行五行之氣散而為萬物萬物之氣聚而為五味五味之氣化而為真一真一散而五芽生五芽生而五根成五根成而五行具五行具而五臟全是以人有五臟同天地之包五行故天以五行之氣內人腹中五臟日日有損月月添衰况性命四時推遷身形寒暑銷爍一臟有損即有病生五臟併枯性命何在以此察之緣五星在天或順或逆賊殺人物能見之者昌也善見者人因五行五穀五味而生因五行五穀五味而死即知五穀之氣是天之沖氣地之土液吾能食之以時返盜物精順其造化上補泥丸下填骨髓世人若解返元合於性命即無五行相剋之虞自然五臟不朽雖使五賊施行乎天吾以得之於心藏之於用返為我有則宇宙雖大莫不在吾掌握萬化雖廣莫不在吾道身矣天性人也人心機也立天之道以定人也盡人則同乎天體天則同乎道道與之生一而不雜人生而厚者性也復其性者處其厚而已即知天有性性通人也人有心機同天也是以人抱厥靈本與天道心性相合機務相符根於一而已由此立天之道以定人也且道通一體性混一真為天地本亦為三才之元天得一以清地得一以寧人得一以靈即知天性同人而人性同天也機出一心即知人心機天而天心機人也心性既同則動合天機心合天機即知天藏機於混沌之內即知混沌中藏天機也天機者天心也混沌中玄機者人心也以心師心能契道者天機與我心同而我性與天機合也故天道人道同根一源是天人不相勝也經云立天之道以定人也是已天發殺機龍蛇起陸人發殺機天地反覆天人合發萬變定基天道純陽以陰為殺機人道處陰陽之中以陽為殺機故春生秋殺是乾坤播大道之風陽氣復而萬物漸生陰氣騰而萬物漸壯龍蛇是陰中有性之物乘五月姤卦一陰始生之氣隨而奔騰出陸者是天道顯肅殺之機自此而始也人道求生純陽即仙純陰即鬼善攝生者能盜天機乘十一月復卦一陽始生之氣以動殺機磨鍊陰滓蕩除尸魄故言天地反覆者是天道人道用陰用陽有所不同而用機之理同於一揆也即知天道發機於返陰之初以定萬變之基即知人道發機於返陽之始以定萬變之基是天道人道合發定基之理也性有巧拙可以伏藏巧則蕩乎心拙則昧乎性是世俗巧拙之用也故聖人之性巧不露機拙不昧性而無馳騁於非道之務動合天機無不伏藏也故天道即無巧拙之用而能長能久者因本性不移常守虛寂合自然之道萬物潛而自化是以天有大美而不言故無巧拙之用也蓋自古高真潛符天道取合自然惟聖人所以恃道化而不任其智巧也但韜迹隱智以密於外澄心封情以定於內道經云我愚人之心也純純兮孔子曰吾與回言終日不違如愚純純兮天機不張而默與道契兹謂大智學者能通大智與天同德則道化可恃而豈有事巧拙之性能契天理者邪故聖人抱一以守不搖其精即知伏藏之性合於自然之道也噫世人之性事巧之心但馳騖於外而患乎人所不知患乎人所不見是以失其性而漏乎神縱乎心而蕩乎志是不知伏藏之理者也經云大巧若拙是巧得於性而事拙於守中者矣九竅之邪在乎三要可以動靜物誘於外則心悅於內聽視品鼻神明出焉慎汝內閉汝外不以通物為樂無得而引之則樂天而自得孰弊弊焉以物為事邪故九竅受邪由乎心性之有動靜邪正之有交涉心不正則性返為情情為用也故動謂之心靜謂之性方其動也返性為情故萬變無常而不能靜也方其靜也返情歸性故吾心常一而不能動也是以心性相混致有邪正交涉也故學者三要不可不知心為動靜之要情為亂性之要性為樂道之要知此三要則不失本性復其性而處厚也故喜怒哀樂不能動乎心或有所動則發於自然是不失吾心常一而物不能引也可以靜則得於守廉而萬變不能惑也故學者動靜之要不可不察也火生於木禍發必剋姦生於國時動必潰知之修鍊謂之聖人達士得機指示後人中有富國安民之道取此為理也緣人之有心心火受姦耗損精氣譬木中有火禍發必剋要在修鍊禁姦然後能通神矣故木者物也陰中有陽是木中藏火也及乎陰木就焚灰燼火滅其何堪焉故聖人立法譬人之有身包含道體抑亦生死繫焉道德經云吾有大患為吾有身故身譬國也胸腹之為室也四肢之列猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也所以安其國吝其氣全其身也為國之姦者九竅為受邪之門三蟲為六欲之鬼誘惑人心交涉六情以此為身國之姦也所以謂身譬國也緣人之身抑亦物之象也內感真一之氣資養百骸得全性命儻心火不禁一真耗散尸魄姦生天年數盡是時動必潰之際也要在禁制心火修鍊陰滓防未起之患治未病之疾用意於未然之前使神自恬而心自灰性自靜而情自弭豈不是知之修鍊為富國安民之法者哉天生天殺道之理也天地萬物之盜萬物人之盜人萬物之盜三盜既宜三才既安世之人莫不為萬物所誘盜乎性命也要在學人返盜萬物精華補填耗損以守常道則德全而神自恬也故一氣含靈於混沌是三才同乎一源也道散則三才分判元氣各存天陽也地陰也陰返陽則萬物生陽返陰則萬物死是天生天殺道之理也天地施工於萬物綿綿若存或聚或散是物無定體而道存乎不二也莊子云物無成無毁復通為一即知天地以陰陽還返之機為萬物之盜也且物中最靈者人也惟人同天地為三才抑亦根乎一氣與天同德亦為萬物之盜也惟萬物同人而生以資人之所欲引盜人之性情抑亦為人之盜也即知人盜萬物以資生萬物盜人以同死天地盜萬物以歸根是三盜既宜三才既安不失造化本末之妙也食其時百骸理動其機萬化安學人既知能盜物精以資吾氣要在食不失時則用機自合造化故食者是五穀之精也所以為精者是天之沖氣地之土液食其時則資益五臟散乎百骸潤澤肌膚即不失造化之本末也是以隨日月之氣復化為太乙真水上貫靈源要在養舌下神水流入肺化為唾唾色白象金心火來剋流入心化為血血色赤象火腎水來剋流入腎化為精精者水也脾土來剋返上泥丸其色黃謂之黃芽復流入鼎烹之為白雪鍊之為青金復貫入心洗滌心血復流於氣海散化補填骨髓即知水盛則土多土多則血強血強則精溢精溢則腦滿是還精補腦之理要在食其時矣人知其神而神不知不神之所以神至幽而無形者神也合自然之體者性也應機接物者情也故神性本乎一體情性分為二用獨知情之為用者往往事神在彼而不知我能神而神也知性通至幽而無形者知神用在我而不以彼神為仰也故學道者將全精神欲達性命則性命之源不可不知也故命者性之本而性其根也精者神之母而神其子也精全則神王盡性則至於命矣故神恬則性靜性靜則心和心和則純素之道可守而不失與神為一也能與神為一者精不離人而神不離氣也神氣相合則形全而通乎無方之用即知不神之神在我而不在彼也日月有數大小有定聖功在焉神明出焉日者陽也月者陰也陰陽者道用也故道用法於自然所以日月之有常數大小之有定分大則莫大乎天地小則不出乎人物人物雖小况萬物中人抱厥靈蓋與天性相通機用同一小可以慕大道之體聖功生而神明出矣且人之生也精受於天一而為智之源神得於天五而為性之本及其至也可以入神可以復命即知人分雖小可以慕天地之大而聖功生達日月之數而神明出傳曰學始乎為士終乎為聖人彼學道者日月之數不可不知大小定分不可不察且天道一日一夜行三百六十五度帶行日月日其行遲一日一夜行一度月其行疾一日一夜行十二度日一年行一周天月一月行一周天一日有十二時六時陽六時陰天降地騰一日一合五日象一元氣一月有三百六十時象一年火候日月三十日一交十五日一合月至晦日隱朔日又生循環晝夜聖功立而萬物生神明出而萬物化是以聖人以此取則修鍊一月之間奪天地一年火候以立聖功經云三十輻共一轂即知一月有三旬首尾二旬是用武火之時也中間一旬月盛圓明是用文火之時也經云首尾武中間文此故也又云藥成須藉月為師又云高奔日月吾上道所以高真上聖體天道之盈虛托日月之定數以小慕大與天同一而通乎大理即知道無小大之間也明矣故莊子云其一與天為徒其不一與人為徒故言大小有定指乎天人之分同乎一而已其盜機也天下莫不見莫能知君子得之固躬小人得之輕命黃帝得皇人言為道求生必由所生法言道機也達士稱下有強兵戰勝之術理在此也儻人能得機要在固躬不可縱情恣欲以輕乎命抱朴子云善其術者能却走焉以補腦故事顯而理隱者天下莫不見也理有可盜而事有可棄者天下莫能知也理有可盜則非道不能取故善為盜者可使由之不可使知之知則沖氣不降機用貴密而事無不濟惟君子所以能固躬而得乎機矣儻小人見理用機行盜則往往不能固躬返有所失是輕命而窮及濫矣故戰勝之術理密機深恐文繁不欲細解但討太一固命金丹經訣即知其詳矣瞽者善聽聾者善視絶利一源用師十倍三返晝夜用師萬倍師者範也範者正也故正者道之常惟正也故能御萬變而獨立于萬變之上是得心師一源之正者也故先達得機之士指示後人稱上有神仙抱一之道理在斯而已是以瞽不善視則專於聽也聾不善聽則專於目也兩者能視聽之專而與常人利於十倍看是得之於心師而利乎一源也故聾瞽之微緣三關外擁內有所隔尚能得利於一源况道者三返晝夜希夷視聽專利一源以心師心豈不有萬倍之利乎故學者抱真守一之道要在歸根可以長存歸根者復元氣之本也莊子云通於一而萬事畢所謂致一則不二抱一則不離守一則不遷惟其不二則能致一也惟其不離則能抱一也惟其不遷則能守一也故守一之道要在心不放逸則性自靜而神自恬德自全而道自集蓋神仙抱一之道始因黃帝見皇人曰博聞有真一之神可得聞乎皇人大驚曰子在民間安得聞此乃上皇主録首篇恐文繁不欲具注但討皇人三一圖經閲之即知抱一守道之詳矣心生於物死於物機在目學人既習抱真守一之道或起動念著物之心要在當用目機以禁乎動念也且心者是一身之主百神之帥勞神疲思莫不因心也故心有動用之機在物不能無惑在意不能無著是以心眼有相須之用情性有取捨之機故心因物動則死於物而有所著有所著則心源不一神性變亂焉能取萬倍之利乎故善為道者心有所著則當用目機禁乎心而百非自泯也當泯心之際勿覺心著但瞑矇瞪目東瞻能如嬰兒則精神不去心潔而清也古詩云髭頭灑血眼如環是用機在目而泯乎心有所著也道經云善閉無關楗而不可開是心靜而不著物者也天之無恩而大恩生迅雷烈風莫不蠢然恩威之大莫大乎天地受賜之心莫出乎人也蓋天降沖和之氣以資世人不有乎間也所以無間者施惠大恩及於萬類惟容人之樂善使通真達道入於聖域經云皇天無親惟與善人即知道無親疏亦無好醜但人能通道則道自通人惟至者能受賜天之大恩與天為徒雖使天道鼓陰怒肅殺之氣張迅雷烈風之威彼至者坦然無畏懼之色由是乎視聽關於外而心意鑰於內也至樂性餘至靜則廉虛靜而不與物雜道之體也古之體道者以內遊為務不以通物為樂樂其性而已人樂其性者非意之也返一無迹因其自然而已故樂性則性無不餘不與物雜則靜無不廉是以樂天知命故不憂性寂喜淡即無貪則心不勞也心不勞則神不漏神不漏則情不動而性至樂也蓋至樂之性得乎至美之遊而達乎至靜之境者廉之致也天之至私用之至公天道容善則至私也用道平始則至公也故天道私人而不私乎道用道至公而不私乎物是至公也皇天無親惟德是輔是私人而不私道也蓋世人之性善惡相混近善即善近惡即惡非本然也蓋因習以性成而已故學人之性要在求訪明師親近良友專心剋志方通入聖之門天且不違應感上靈要在洗心克己不放道心自有天神暗助志不可退也若尋訪師友得其人則師事之不得其人則兀兀而行身且安樂性命之學不可忽也禽之制在氣天虛則氣浮氣浮則禽因羽而制氣飛而能上也故學者要在虛其心而守乎靜平其氣而恬乎神則心自順而不姦性自靜而不惑是以神為氣子氣為神母神氣相合則真精不散神安而形固氣使之然也蓋人之有身物之象也象同乎物則生死繫焉有時而盡也要在氣壯則神全氣衰則神敗經云禽之制在氣禽者擒也擒乎心制乎氣也且禽能飛而上者猶人之有氣充實太虛扶持天地舉形而仙矣良由心虛則氣充大宇與道集虛虛室生白是能養一氣制使之然也孟子云吾能養浩然之氣塞于天地之間是深得制氣之道者也生者死之根死者生之根造化密移陰陽不測生於神而死於形者通一氣本於自然也故生者造化之所始死者陰陽之所變蓋物無並盛陰陽是也即知萬物因陰陽以形因陰陽以化本經云天生天殺道之理也故大道根乎一氣運行日月日月是陰陽之祖互相交感布氣生靈陽氣返而萬物生陰氣復而萬物死即知生死之理根於道源若存若亡也蓋人之道抑亦生死所繫根於一氣感父母陰陽氣合而生也陰陽數盡而死也要在以陽鍊陰陰滓盡而陽體就一氣充而道自亨則還元返本歸根復命而至矣恩生於害害生於恩以仁為恩害則隨之故恩愛相生是人之用情之本也學道者往往為恩愛繫纍中道而止半塗而廢始勤而終怠者凡民之情莫不然歟所以自取害而害生於恩也要在切知一氣通靈萬禍不侵一身達道七祖升天能剋志進道者恩及身而害不加我也其昧者恩愛之心不除則恩及彼而害及我也故恩愛之心滿世人之惑也榮辱之情舉世人之貪也噫憂苦勞傷之害何為天下人之樂從而不為害者是恩愛厚而為害之深根也善為道者則不然以恬神為樂以寂寞為榮澡雪乎心靜默乎志所以恩不加彼而害不及我也愚人以天地文理聖我以時物文理哲日用資生養命之物是助道本根之靈液也故人有賢愚量有淺深人賢則智見高明量寬志大人愚則慮淺識卑出言必下殊不知天地文理法於自然循流萬古不變不遷以常數為定體愚人者獨以此為聖而殊不察時物文理人所日用而不知其詳也故五穀者是天下人之日用之物也但世人務取乎飽食而不究乎造化之本末也蓋五穀盜天地造化而生盜天地沖氣而實即知五穀是天地真一之精長茂成熟人得食之接氣延生受脾胃磨而精華靈液化為太一真水是五行之先號又焉知五穀精氣是天地之靈液日月之華英五行之精髓能資我生能益我氣能助我形能延我命能全我神能通我聖所謂我以時物文理為哲者其是之謂歟黃帝陰符經注解終
