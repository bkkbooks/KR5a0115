front:
  text: 黃帝陰符經注解序閏七道之所貴者書也書之所貴者言也言之所貴者意也故大道無言非立言無以明乎理大象無形非立象無以測乎奧象之妙非言不宣言之妙非學不傳混元皇帝有言吾學而得之非得於自然也意者未有不因學而能鑒道者也蓋一真之妙道體顯然其不知者天地相遠知之者豈離目前蓋上真慈憫垂元法於世中撈摝群生立教之言言盡詮而理隱乎意也黃帝陰符書三百餘言直指人心使諦觀天道與人道有陰符契機之理故言觀天之道執天之行盡矣臣愚嘗覽後人注解往往穿鑿不究經旨首尾言意但分門臆説汗漫使學者無所適從臣愚不揆謾有解釋非敢僭符聖教以光己説蓋得至人一言方敢注釋以補萬分之一待將來者矣黃帝陰符經注解
